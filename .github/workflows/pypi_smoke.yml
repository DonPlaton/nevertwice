# First-touch smoke against the REAL distribution channel: install the given version
# from PyPI on all three OSes and run the storefront loop with no model anywhere.
# Manual trigger only - run it right after `twine upload`, before any promotion post.
# Exists because a green suite once shipped a broken first touch (2.1.0): the built
# wheel and the uploaded artifact are not the same test.
name: pypi-smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version on PyPI to smoke-test (e.g. 2.2.0)"
        required: true

permissions:
  contents: read

jobs:
  first-touch:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install from PyPI (the artifact users actually get)
        shell: bash
        # unpinned BY DESIGN (Scorecard alert dismissed with reason): this job's whole
        # purpose is the exact command a stranger runs. A fresh upload can take minutes
        # to reach every index edge, so retry instead of flaking.
        run: |
          for i in $(seq 1 12); do
            pip install "nevertwice==${{ github.event.inputs.version }}" && exit 0
            echo "index edge does not have it yet (attempt $i/12) - retrying in 15s"
            sleep 15
          done
          echo "::error::version never appeared on the index"
          exit 1
      - name: First-touch loop, no model, clean machine
        shell: bash
        env:
          NEVERTWICE_HOME: ${{ runner.temp }}/nv-store
          NEVERTWICE_CLOUD: none
          OLLAMA_URL: http://127.0.0.1:1
          NEVERTWICE_XRERANK: "0"
        run: |
          set -e
          nevertwice-remember --project demo --type mistake \
            --title "CUDA OOM at batch=64 on the GPU" \
            --prevention "lower batch size or enable gradient checkpointing"
          nevertwice-search "training crashes out of gpu memory" demo --json > hits.json \
            || { echo "::error::search exited nonzero; stdout was:"; cat hits.json; exit 1; }
          python -c "import json; h=json.load(open('hits.json')); assert h and h[0]['score']>0, h; print('search hit:', h[0]['title'], h[0]['score'])"
          printf 'Prefers concise answers without preamble.\n' > mem.txt
          nevertwice-import --from chatgpt --path mem.txt
          nevertwice-search "concise answers without preamble" user --json > hits2.json \
            || { echo "::error::import search exited nonzero; stdout was:"; cat hits2.json; exit 1; }
          python -c "import json; h=json.load(open('hits2.json')); assert h, 'imported memory not recallable'; print('import recallable:', h[0]['title'])"
          python -m nevertwice.stats
          nevertwice-dashboard --out "$RUNNER_TEMP/dash.html" --no-open
          echo "first touch OK on ${{ matrix.os }}"
