# OpenSSF Scorecard: an automated supply-chain / security-hygiene score (branch
# protection, pinned actions, token permissions, dangerous workflow patterns, and more).
# Results post to the repo Security tab and to the public Scorecard API, which backs the
# README badge. Runs weekly and when branch protection changes.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "18 5 * * 2"   # weekly, Tuesday 05:18 UTC
  push:
    branches: [master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload the SARIF result to the Security tab
      id-token: write          # publish the result to the public Scorecard API (for the badge)
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
