# CodeQL static analysis. The core is standard-library Python, so this should stay clean;
# it runs on every push/PR to the default branch and weekly, and surfaces findings in the
# repo Security tab as a public "we scan our own code" trust signal.
name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "27 4 * * 1"   # weekly, Monday 04:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload results to the Security tab
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: python
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml   # documented policy excludes

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:python"
