name: tests

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read   # least privilege: the test job only needs to read the repo

jobs:
  # The shipped product (nevertwice/) supports Python 3.10+, so the core suite runs the full
  # matrix across three OSes. Tests are stdlib-only and mock the LLM/embedder - no network, no GPU.
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run core suites
        shell: bash
        run: |
          set -e
          for t in tests/_test_*.py; do python "$t"; done

  # The research/ harnesses are maintainer dev-tools (not in the wheel); they run on current
  # Python only, so they may use newer syntax than the product's 3.10 floor.
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Run research suites
        shell: bash
        run: |
          set -e
          for t in tests/research/_test_*.py; do python "$t"; done
