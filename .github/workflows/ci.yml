name: tests

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read   # least privilege: the test job only needs to read the repo

jobs:
  test:
    # Cross-platform: the path/tracking layer is OS-aware (P-2). Tests are
    # stdlib-only and mock the LLM/embedder — no network, no GPU.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suites
        run: |
          python nevertwice/_test_memory_hook.py
          python nevertwice/_test_memory_v2.py
          python nevertwice/_test_memory_v3.py
          python nevertwice/_test_audit_fixes.py
          python nevertwice/_test_failure_injection.py
          python nevertwice/_test_api.py
          python nevertwice/_test_capture.py
          python nevertwice/_test_integrations.py
          python nevertwice/_test_cloud_embed.py
          python nevertwice/_test_ingest.py
          python nevertwice/_test_watch.py
          python nevertwice/_test_quant.py
          python nevertwice/_test_entities.py
          python nevertwice/_test_digest.py
          python nevertwice/_test_docparse.py
          python nevertwice/_test_dashboard.py
          python nevertwice/_test_guards.py
          python nevertwice/_test_anticipate.py
          python nevertwice/_test_causal.py
          python nevertwice/_test_merge.py
          python nevertwice/research/_test_qa_eval.py
          python nevertwice/research/_test_longitudinal.py
          python nevertwice/research/_test_live_validation.py
