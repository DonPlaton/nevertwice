name: tests

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read   # least privilege: the test job only needs to read the repo

jobs:
  test:
    # Cross-platform: the path/tracking layer is OS-aware (P-2). Tests are
    # stdlib-only and mock the LLM/embedder — no network, no GPU.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suites
        run: |
          python anamnesis/_test_memory_hook.py
          python anamnesis/_test_memory_v2.py
          python anamnesis/_test_memory_v3.py
          python anamnesis/_test_audit_fixes.py
          python anamnesis/_test_failure_injection.py
          python anamnesis/_test_api.py
          python anamnesis/_test_capture.py
          python anamnesis/_test_integrations.py
          python anamnesis/_test_cloud_embed.py
          python anamnesis/_test_ingest.py
          python anamnesis/_test_watch.py
          python anamnesis/_test_quant.py
          python anamnesis/_test_entities.py
