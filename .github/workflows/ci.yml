name: tests

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read   # least privilege: the test job only needs to read the repo

jobs:
  test:
    # Cross-platform: the path/tracking layer is OS-aware (P-2). Tests are
    # stdlib-only and mock the LLM/embedder - no network, no GPU.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suites
        shell: bash
        run: |
          set -e
          for t in tests/_test_*.py tests/research/_test_*.py; do python "$t"; done
