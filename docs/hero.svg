<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Anamnesis — local-first long-term memory for AI coding agents, plain Markdown and Git, zero dependencies, LongMemEval R@5 0.80 ahead of Mem0 0.76">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="0.55" stop-color="#141026"/>
      <stop offset="1" stop-color="#1d1140"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.24" cy="0.5" r="0.62">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="20" y="20" width="1160" height="590" rx="20" fill="none" stroke="#7c5cff" stroke-opacity="0.14" stroke-width="2"/>

  <!-- self-wiring knowledge graph: notes (small nodes) wiring into one memory (the hub) -->
  <g transform="translate(258,316)">
    <g stroke="#8b7cff" stroke-opacity="0.45" stroke-width="2.5">
      <line x1="0" y1="0" x2="-120" y2="-94"/>
      <line x1="0" y1="0" x2="132" y2="-72"/>
      <line x1="0" y1="0" x2="-92" y2="116"/>
      <line x1="0" y1="0" x2="112" y2="104"/>
      <line x1="0" y1="0" x2="150" y2="22"/>
      <line x1="-120" y1="-94" x2="132" y2="-72"/>
      <line x1="132" y1="-72" x2="150" y2="22"/>
      <line x1="150" y1="22" x2="112" y2="104"/>
      <line x1="-92" y1="116" x2="112" y2="104"/>
      <line x1="-120" y1="-94" x2="-92" y2="116"/>
    </g>
    <g fill="#b9a8ff">
      <circle cx="-120" cy="-94" r="13"/>
      <circle cx="132" cy="-72" r="16"/>
      <circle cx="-92" cy="116" r="12"/>
      <circle cx="112" cy="104" r="15"/>
      <circle cx="150" cy="22" r="11"/>
    </g>
    <circle cx="0" cy="0" r="29" fill="url(#accent)"/>
    <circle cx="0" cy="0" r="29" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2"/>
  </g>

  <!-- wordmark + tagline -->
  <g fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="448" y="250" font-size="86" font-weight="800" letter-spacing="-2">Anamnesis</text>
    <text x="451" y="306" font-size="27" font-weight="600" fill="#cdc7e6">Local-first long-term memory for AI coding agents</text>
    <text x="451" y="346" font-size="22" font-weight="500" fill="#8e89aa">plain Markdown + Git&#160;&#160;·&#160;&#160;zero dependencies&#160;&#160;·&#160;&#160;no vector DB</text>
  </g>

  <!-- benchmark proof pill -->
  <g transform="translate(451,384)">
    <rect x="0" y="0" rx="22" ry="22" width="420" height="44" fill="#7c5cff" fill-opacity="0.16" stroke="#7c5cff" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="24" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="21" font-weight="600" fill="#d8d1fb">LongMemEval R@5&#160;&#160;<tspan fill="#ffffff" font-weight="800">0.80</tspan>&#160;&#160;&#8250;&#160;&#160;Mem0 0.76</text>
  </g>
</svg>
